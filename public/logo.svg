<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Umatul Islam Center logo">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8f0c8"/>
    </radialGradient>
  </defs>

  <!-- Outer black ring -->
  <circle cx="100" cy="100" r="99" fill="#111"/>

  <!-- Green ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#22c55e" stroke-width="8"/>

  <!-- Thin blue ring -->
  <circle cx="100" cy="100" r="84" fill="none" stroke="#3b3fc8" stroke-width="2.5"/>

  <!-- White inner fill -->
  <circle cx="100" cy="100" r="81" fill="url(#bg)"/>

  <!-- Arabic heading: مركز أمة الإسلام -->
  <text x="100" y="46" text-anchor="middle"
    font-family="'Amiri','Times New Roman',serif"
    font-size="15.5" font-weight="700"
    fill="#1a2e1a" direction="rtl">مركز أمة الإسلام</text>

  <!-- ── Mosque silhouette ── -->
  <!-- Main dome arch -->
  <path d="M72 110 Q100 70 128 110Z" fill="#3b2a1a"/>
  <!-- Main dome base ellipse -->
  <ellipse cx="100" cy="110" rx="28" ry="9" fill="#3b2a1a"/>
  <!-- Left small dome -->
  <path d="M58 118 Q70 103 82 118Z" fill="#3b2a1a"/>
  <ellipse cx="70" cy="118" rx="12" ry="5" fill="#3b2a1a"/>
  <!-- Right small dome -->
  <path d="M118 118 Q130 103 142 118Z" fill="#3b2a1a"/>
  <ellipse cx="130" cy="118" rx="12" ry="5" fill="#3b2a1a"/>
  <!-- Minaret right -->
  <rect x="138" y="88" width="7" height="36" fill="#3b2a1a"/>
  <path d="M136 88 L147 88 L141.5 78Z" fill="#3b2a1a"/>
  <circle cx="141.5" cy="76.5" r="2.5" fill="#3b2a1a"/>
  <!-- Crescent on main dome -->
  <path d="M96 77 Q100 72 104 77 Q101 74.5 96 77Z" fill="#3b2a1a"/>
  <!-- Building body -->
  <rect x="58" y="123" width="72" height="18" fill="#3b2a1a" rx="1"/>
  <!-- Arched windows -->
  <path d="M67 141 L67 130 Q72 124 77 130 L77 141Z" fill="#c8f0c8"/>
  <path d="M86 141 L86 130 Q91 124 96 130 L96 141Z" fill="#c8f0c8"/>
  <path d="M105 141 L105 130 Q110 124 115 130 L115 141Z" fill="#c8f0c8"/>

  <!-- UIC text below mosque -->
  <text x="100" y="155" text-anchor="middle"
    font-family="'Georgia','Times New Roman',serif"
    font-size="11" font-weight="900" letter-spacing="1.5"
    fill="#1a2e1a">UIC</text>

  <!-- Curved bottom text: UMATUL ISLAM CENTER -->
  <path id="arc" d="M 22,100 A 78,78 0 0,0 178,100" fill="none"/>
  <text font-family="'Georgia','Times New Roman',serif" font-size="9.5" font-weight="700" fill="#1a2e1a" letter-spacing="1.8">
    <textPath href="#arc" start-offset="50%" text-anchor="middle">UMATUL ISLAM CENTER</textPath>
  </text>
</svg>
